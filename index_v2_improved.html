<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NESCO Smart Dashboard v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .skeleton {
        animation: pulse 1.4s infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.55;
        }
      }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900 transition-colors">
    <nav
      class="sticky top-0 z-50 bg-white/95 dark:bg-slate-800/95 backdrop-blur border-b">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div>
          <h1
            class="text-lg md:text-2xl font-bold text-slate-800 dark:text-white">
            NESCO Smart Dashboard
          </h1>
          <p class="text-xs md:text-sm text-slate-500">
            Professional Meter Portal
          </p>
        </div>

        <div class="flex items-center gap-2">
          <div class="flex gap-1 md:gap-2">
            <button
              class="tab-btn text-xs md:text-sm px-2 md:px-4 py-2 rounded-lg bg-blue-600 text-white"
              onclick="showTab('overview', this)">
              Overview
            </button>
            <button
              class="tab-btn text-xs md:text-sm px-2 md:px-4 py-2 rounded-lg bg-slate-200"
              onclick="showTab('profile', this)">
              Profile
            </button>
            <button
              class="tab-btn text-xs md:text-sm px-2 md:px-4 py-2 rounded-lg bg-slate-200"
              onclick="showTab('history', this)">
              History
            </button>
            <button
              class="tab-btn text-xs md:text-sm px-2 md:px-4 py-2 rounded-lg bg-slate-200"
              onclick="showTab('downloads', this)">
              Downloads
            </button>
          </div>

          <button
            id="themeBtn"
            class="p-2 rounded-lg bg-slate-200 dark:bg-slate-700">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-width="2"
                d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36 6.36-1.41-1.41M7.05 7.05 5.64 5.64m12.72 0-1.41 1.41M7.05 16.95l-1.41 1.41" />
              <circle cx="12" cy="12" r="4" stroke-width="2" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-5 shadow mb-6">
        <div class="flex flex-col md:flex-row gap-3">
          <input
            id="meterInput"
            class="flex-1 border rounded-2xl px-4 py-4 dark:bg-slate-700 dark:text-white"
            placeholder="Enter Customer Number" />
          <button
            id="searchBtn"
            onclick="searchMeter()"
            class="bg-blue-600 text-white rounded-2xl px-8 py-4">
            Search Meter
          </button>
        </div>
      </div>

      <div id="loader" class="hidden">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
        </div>
      </div>

      <div id="statsSection" class="hidden">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="bg-blue-600 text-white rounded-3xl p-5">
            <p>Balance</p>
            <h2 id="balanceCard"></h2>
          </div>
          <div class="bg-green-600 text-white rounded-3xl p-5">
            <p>Meter No</p>
            <h2 id="meterCard"></h2>
          </div>
          <div class="bg-purple-600 text-white rounded-3xl p-5">
            <p>Tariff</p>
            <h2 id="tariffCard"></h2>
          </div>
          <div class="bg-orange-600 text-white rounded-3xl p-5">
            <p>Status</p>
            <h2 id="statusCard"></h2>
          </div>
        </div>
      </div>

      <div id="dashboard" class="hidden">
        <div id="overview" class="tab-content active">
          <div class="bg-white dark:bg-slate-800 rounded-3xl p-6">
            <div id="overviewContent"></div>
          </div>
        </div>

        <div id="profile" class="tab-content">
          <div class="bg-white dark:bg-slate-800 rounded-3xl p-6">
            <div
              id="profileGrid"
              class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
          </div>
        </div>

        <div id="history" class="tab-content">
          <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 overflow-auto">
            <table class="w-full">
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>

        <div id="downloads" class="tab-content">
          <div
            class="bg-white dark:bg-slate-800 rounded-3xl p-6 flex flex-col gap-4">
            <a
              id="pdfHistory"
              target="_blank"
              class="bg-green-600 text-white p-4 rounded-xl text-center"
              >Recharge History PDF</a
            >
            <a
              id="pdfCert"
              target="_blank"
              class="bg-purple-600 text-white p-4 rounded-xl text-center"
              >Certificate PDF</a
            >
          </div>
        </div>
      </div>
    </div>

    <script>
      function showTab(id, btn) {
        document
          .querySelectorAll(".tab-content")
          .forEach((x) => x.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document
          .querySelectorAll(".tab-btn")
          .forEach(
            (x) =>
              (x.className = x.className.replace(
                "bg-blue-600 text-white",
                "bg-slate-200",
              )),
          );
        btn.classList.add("bg-blue-600", "text-white");

        const stats = document.getElementById("statsSection");
        if (id === "overview") stats.classList.remove("hidden");
        else stats.classList.add("hidden");
      }

      const root = document.documentElement;
      if (localStorage.theme === "dark") root.classList.add("dark");
      themeBtn.onclick = () => {
        root.classList.toggle("dark");
        localStorage.theme = root.classList.contains("dark") ? "dark" : "light";
      };

      async function searchMeter() {
        const custNo = meterInput.value.trim();
        if (!custNo) return;

        loader.classList.remove("hidden");
        dashboard.classList.add("hidden");
        statsSection.classList.add("hidden");

        try {
          const res = await fetch(
            `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}`,
          );
          const data = await res.json();
          const c = data.customer || {};

          dashboard.classList.remove("hidden");
          statsSection.classList.remove("hidden");

          balanceCard.textContent = c.balance || "N/A";
          meterCard.textContent = c.meterNo || "N/A";
          tariffCard.textContent = c.tariff || "N/A";
          statusCard.textContent = c.meterStatus || "N/A";

          overviewContent.innerHTML = `<div class="grid md:grid-cols-3 gap-4"><div class="bg-slate-100 dark:bg-slate-700 p-4 rounded-xl">Customer: ${c.name || ""}</div><div class="bg-slate-100 dark:bg-slate-700 p-4 rounded-xl">Consumer: ${c.consumerNo || ""}</div><div class="bg-slate-100 dark:bg-slate-700 p-4 rounded-xl">Office: ${c.office || ""}</div></div>`;

          profileGrid.innerHTML = "";
          Object.entries(c).forEach(
            ([k, v]) =>
              (profileGrid.innerHTML += `<div class="border rounded-xl p-4 dark:text-white"><div class="text-sm opacity-70">${k}</div><b>${v || ""}</b></div>`),
          );

          historyBody.innerHTML = "";
          (data.rechargeHistory || []).forEach(
            (r) =>
              (historyBody.innerHTML += `<tr><td>${r.tokenNo || ""}</td><td>${r.rechargeAmount || ""}</td><td>${r.rechargeDate || ""}</td></tr>`),
          );

          pdfHistory.href = `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}/recharge-history/pdf`;
          pdfCert.href = `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}/certificate/pdf`;
        } catch (e) {
          alert(e.message);
        } finally {
          loader.classList.add("hidden");
        }
      }

      meterInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchMeter();
      });
    </script>
  </body>
</html>
