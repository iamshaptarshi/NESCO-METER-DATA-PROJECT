<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NESCO Smart Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <style>
      body {
        transition: 0.3s;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .skeleton {
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
      }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900">
    <div
      id="toast"
      class="toast hidden bg-red-500 text-white px-4 py-3 rounded-xl shadow-lg"></div>

    <nav class="sticky top-0 bg-white dark:bg-slate-800 shadow z-50">
      <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold text-slate-800 dark:text-white">
            ⚡ NESCO Smart Dashboard
          </h1>
          <p class="text-slate-500 dark:text-slate-300 text-sm">
            Professional Meter Portal
          </p>
        </div>

        <div class="flex gap-3 items-center">
          <button
            id="themeBtn"
            class="px-4 py-2 rounded-xl bg-slate-200 dark:bg-slate-700 dark:text-white">
            🌙 Dark Mode
          </button>
        </div>
      </div>

      <div class="px-4 pb-3 overflow-x-auto">
        <div class="flex gap-2 min-w-max">
          <button
            class="tab-btn px-4 py-2 bg-blue-600 text-white rounded-xl"
            onclick="showTab('overview', this)">
            Overview
          </button>
          <button
            class="tab-btn px-4 py-2 bg-slate-200 rounded-xl"
            onclick="showTab('profile', this)">
            Profile
          </button>
          <button
            class="tab-btn px-4 py-2 bg-slate-200 rounded-xl"
            onclick="showTab('history', this)">
            Recharge History
          </button>
          <button
            class="tab-btn px-4 py-2 bg-slate-200 rounded-xl"
            onclick="showTab('downloads', this)">
            Downloads
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
      <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow mb-6">
        <div class="flex flex-col md:flex-row gap-3">
          <input
            id="meterInput"
            placeholder="Enter Customer Number"
            class="flex-1 border px-5 py-4 rounded-2xl dark:bg-slate-700 dark:text-white" />
          <button
            id="searchBtn"
            onclick="searchMeter()"
            class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-semibold">
            Search Meter
          </button>
        </div>
      </div>

      <div id="loader" class="hidden">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
          <div
            class="h-28 bg-white dark:bg-slate-800 rounded-3xl skeleton"></div>
        </div>
      </div>

      <div id="dashboard" class="hidden">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div
            class="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-3xl p-5">
            <p>Balance</p>
            <h2 id="balanceCard" class="text-3xl font-bold"></h2>
          </div>
          <div
            class="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-3xl p-5">
            <p>Meter No</p>
            <h2 id="meterCard" class="font-bold"></h2>
          </div>
          <div
            class="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-3xl p-5">
            <p>Tariff</p>
            <h2 id="tariffCard" class="font-bold"></h2>
          </div>
          <div
            class="bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-3xl p-5">
            <p>Status</p>
            <h2 id="statusCard" class="font-bold"></h2>
          </div>
        </div>

        <div id="overview" class="tab-content active">
          <div
            class="bg-white dark:bg-slate-800 dark:text-white rounded-3xl p-6 shadow">
            <h2 class="text-2xl font-bold mb-4">Overview</h2>
            <div id="overviewContent" class="grid md:grid-cols-3 gap-4"></div>
          </div>
        </div>

        <div id="profile" class="tab-content">
          <div
            class="bg-white dark:bg-slate-800 dark:text-white rounded-3xl p-6 shadow">
            <h2 class="text-2xl font-bold mb-4">Profile</h2>
            <div
              id="profileGrid"
              class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
          </div>
        </div>

        <div id="history" class="tab-content">
          <div
            class="bg-white dark:bg-slate-800 dark:text-white rounded-3xl p-6 shadow overflow-auto">
            <table class="w-full">
              <thead>
                <tr>
                  <th>Token</th>
                  <th>Amount</th>
                  <th>Unit</th>
                  <th>Method</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>

        <div id="downloads" class="tab-content">
          <div
            class="bg-white dark:bg-slate-800 dark:text-white rounded-3xl p-6 shadow">
            <div class="flex gap-4 flex-col md:flex-row">
              <a
                id="pdfHistory"
                target="_blank"
                class="bg-green-600 text-white px-6 py-4 rounded-xl text-center"
                >Recharge History PDF</a
              >
              <a
                id="pdfCert"
                target="_blank"
                class="bg-purple-600 text-white px-6 py-4 rounded-xl text-center"
                >Certificate PDF</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.remove("hidden");
        setTimeout(() => t.classList.add("hidden"), 3000);
      }

      function showTab(id, btn) {
        document
          .querySelectorAll(".tab-content")
          .forEach((x) => x.classList.remove("active"));
        document.getElementById(id).classList.add("active");

        document.querySelectorAll(".tab-btn").forEach((x) => {
          x.classList.remove("bg-blue-600", "text-white");
          x.classList.add("bg-slate-200");
        });
        btn.classList.add("bg-blue-600", "text-white");
      }

      const root = document.documentElement;
      const saved = localStorage.getItem("theme");
      if (saved === "dark") root.classList.add("dark");

      document.getElementById("themeBtn").onclick = () => {
        root.classList.toggle("dark");
        localStorage.setItem(
          "theme",
          root.classList.contains("dark") ? "dark" : "light",
        );
      };

      async function searchMeter() {
        const custNo = meterInput.value.trim();
        if (!custNo) return toast("Enter customer number");

        loader.classList.remove("hidden");
        dashboard.classList.add("hidden");
        searchBtn.disabled = true;

        try {
          const res = await fetch(
            `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}`,
          );
          if (!res.ok) throw new Error("Failed to fetch data");

          const data = await res.json();
          const c = data.customer || {};

          dashboard.classList.remove("hidden");

          balanceCard.textContent = c.balance || "N/A";
          meterCard.textContent = c.meterNo || "N/A";
          tariffCard.textContent = c.tariff || "N/A";
          statusCard.textContent = c.meterStatus || "N/A";

          overviewContent.innerHTML = `
<div class="bg-blue-50 dark:bg-slate-700 rounded-xl p-4">Customer: ${c.name || ""}</div>
<div class="bg-green-50 dark:bg-slate-700 rounded-xl p-4">Consumer: ${c.consumerNo || ""}</div>
<div class="bg-purple-50 dark:bg-slate-700 rounded-xl p-4">Office: ${c.office || ""}</div>`;

          profileGrid.innerHTML = "";
          Object.entries(c).forEach(([k, v]) => {
            profileGrid.innerHTML += `<div class="border rounded-xl p-4">${k}<br><b>${v || ""}</b></div>`;
          });

          historyBody.innerHTML = "";
          (data.rechargeHistory || []).forEach((r) => {
            historyBody.innerHTML += `<tr><td>${r.tokenNo || ""}</td><td>${r.rechargeAmount || ""}</td><td>${r.energyUnit || ""}</td><td>${r.method || ""}</td><td>${r.rechargeDate || ""}</td></tr>`;
          });

          pdfHistory.href = `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}/recharge-history/pdf`;
          pdfCert.href = `https://nesco-meter-data-project.onrender.com/api/meter/${custNo}/certificate/pdf`;
        } catch (e) {
          toast(e.message);
        } finally {
          loader.classList.add("hidden");
          searchBtn.disabled = false;
        }
      }

      meterInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchMeter();
      });
    </script>
  </body>
</html>
